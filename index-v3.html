<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>micr.fun - Games, experiments, tools & knowledge</title>
  <meta name="description" content="A standalone catalog of micr.fun games, experiments, tools and knowledge.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: #151b23;
      --panel-strong: #1b2330;
      --text: #f0f3f6;
      --muted: #9aa7b6;
      --line: rgba(240, 246, 252, 0.12);
      --gold: #d4a853;
      --purple: #a371f7;
      --blue: #58a6ff;
      --green: #56d364;
      --danger: #ff7b72;
      --shadow: 0 18px 52px rgba(0, 0, 0, 0.28);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(212, 168, 83, 0.13), transparent 34rem),
        linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent 18rem),
        var(--bg);
      color: var(--text);
      font-family: Fraunces, Georgia, serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font: inherit;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 20;
      border-bottom: 1px solid var(--line);
      background: rgba(13, 17, 23, 0.86);
      backdrop-filter: blur(18px);
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 64px;
      gap: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: var(--text);
      font-size: 1.08rem;
      font-weight: 700;
    }

    .brand-mark {
      display: grid;
      width: 34px;
      height: 34px;
      place-items: center;
      border: 1px solid rgba(212, 168, 83, 0.42);
      border-radius: var(--radius);
      background: rgba(212, 168, 83, 0.12);
      color: var(--gold);
      flex: 0 0 auto;
    }

    .brand-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .lang-switcher {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.04);
      flex: 0 0 auto;
    }

    .lang-btn {
      min-width: 42px;
      min-height: 34px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 160ms ease, color 160ms ease;
    }

    .lang-btn:hover,
    .lang-btn:focus-visible {
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      outline: none;
    }

    .lang-btn.active {
      background: var(--gold);
      color: #15100a;
      font-weight: 700;
    }

    .hero {
      padding: 48px 0 34px;
    }

    .eyebrow {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    h1 {
      max-width: 820px;
      margin: 0;
      font-size: clamp(2.25rem, 9vw, 5.8rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .subtitle {
      max-width: 660px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: clamp(1rem, 3.3vw, 1.34rem);
      line-height: 1.55;
    }

    .status {
      margin: 12px 0 30px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .status.error {
      color: var(--danger);
    }

    .catalog {
      display: grid;
      gap: 42px;
      padding: 8px 0 72px;
    }

    .category-section {
      --category: var(--gold);
      scroll-margin-top: 84px;
    }

    .category-section[data-category="games"] {
      --category: var(--gold);
    }

    .category-section[data-category="experiments"] {
      --category: var(--purple);
    }

    .category-section[data-category="tools"] {
      --category: var(--blue);
    }

    .category-section[data-category="knowledge"] {
      --category: var(--green);
    }

    .category-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    .category-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0;
      font-size: clamp(1.45rem, 5vw, 2.25rem);
      line-height: 1;
    }

    .category-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--category);
      box-shadow: 0 0 0 7px color-mix(in srgb, var(--category) 14%, transparent);
    }

    .category-count {
      color: var(--muted);
      font-size: 0.92rem;
      white-space: nowrap;
    }

    .card-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-top: 18px;
    }

    .cell-card {
      display: grid;
      min-height: 178px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--category) 15%, transparent), transparent 48%),
        var(--panel);
      box-shadow: var(--shadow);
      transition: border-color 180ms ease, transform 180ms ease, background 180ms ease;
    }

    .cell-card:hover,
    .cell-card:focus-visible {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--category) 58%, white 0%);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--category) 20%, transparent), transparent 54%),
        var(--panel-strong);
      outline: none;
    }

    .card-top {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 14px;
    }

    .cell-icon {
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border: 1px solid color-mix(in srgb, var(--category) 35%, transparent);
      border-radius: var(--radius);
      background: rgba(13, 17, 23, 0.55);
      font-size: 1.45rem;
    }

    .cell-category {
      color: var(--category);
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .cell-title {
      margin: 22px 0 0;
      font-size: 1.45rem;
      line-height: 1.08;
      letter-spacing: 0;
    }

    .cell-desc {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.5;
    }

    .empty-category,
    .empty-state {
      padding: 22px;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.025);
      color: var(--muted);
      line-height: 1.5;
    }

    .empty-category {
      margin-top: 18px;
      border-color: color-mix(in srgb, var(--category) 24%, transparent);
    }

    .footer {
      padding: 26px 0 34px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (min-width: 640px) {
      .shell {
        width: min(1120px, calc(100% - 48px));
      }

      .hero {
        padding-top: 70px;
      }

      .card-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 980px) {
      .header-inner {
        min-height: 76px;
      }

      .hero {
        padding: 88px 0 48px;
      }

      .card-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="shell header-inner">
      <a class="brand" href="/" aria-label="micr.fun">
        <span class="brand-mark" aria-hidden="true">m</span>
        <span class="brand-name">micr.fun</span>
      </a>
      <nav class="lang-switcher" aria-label="Language">
        <button class="lang-btn active" type="button" data-lang="en" aria-pressed="true">EN</button>
        <button class="lang-btn" type="button" data-lang="ru" aria-pressed="false">RU</button>
      </nav>
    </div>
  </header>

  <main>
    <section class="shell hero" aria-labelledby="page-title">
      <p class="eyebrow">micr.fun</p>
      <h1 id="page-title" data-i18n="catalog.title">A catalog of games, experiments, tools &amp; knowledge</h1>
      <p class="subtitle" data-i18n="catalog.subtitle">Micro-formats for learning, playing and exploring</p>
    </section>

    <div class="shell">
      <p id="status" class="status" role="status" aria-live="polite">Loading...</p>
      <div id="catalog" class="catalog" aria-live="polite"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="shell">micr.fun</div>
  </footer>

  <script>
    (() => {
      const CATEGORY_ORDER = ['games', 'experiments', 'tools', 'knowledge'];
      const FALLBACK_I18N = {
        en: {
          catalog: {
            title: 'A catalog of games, experiments, tools & knowledge',
            subtitle: 'Micro-formats for learning, playing and exploring'
          },
          categories: {
            games: 'Games',
            experiments: 'Experiments',
            tools: 'Tools',
            knowledge: 'Knowledge'
          },
          ui: {
            language: 'Language',
            loading: 'Loading...',
            error: 'Could not load the catalog. Please try again later.',
            empty: 'No cells yet',
            count_one: '1 cell',
            count_other: '{count} cells'
          }
        },
        ru: {
          catalog: {
            title: 'Каталог игр, экспериментов, инструментов и знаний',
            subtitle: 'Микроформаты для обучения, игр и исследований'
          },
          categories: {
            games: 'Игры',
            experiments: 'Эксперименты',
            tools: 'Инструменты',
            knowledge: 'Знания'
          },
          ui: {
            language: 'Язык',
            loading: 'Загрузка...',
            error: 'Не удалось загрузить каталог. Попробуйте позже.',
            empty: 'Пока пусто',
            count_one: '1 элемент',
            count_other: '{count} элементов'
          }
        }
      };

      const savedLang = localStorage.getItem('micrfun.lang');
      const browserLang = (navigator.language || '').toLowerCase().startsWith('ru') ? 'ru' : 'en';
      const state = {
        lang: savedLang || browserLang,
        i18n: {},
        graph: null
      };

      const catalog = document.getElementById('catalog');
      const status = document.getElementById('status');
      const langButtons = Array.from(document.querySelectorAll('.lang-btn'));

      function getValue(source, path) {
        return path.split('.').reduce((value, key) => value && value[key], source);
      }

      function t(path, params = {}) {
        const table = state.i18n[state.lang] || FALLBACK_I18N[state.lang] || FALLBACK_I18N.en;
        const fallback = FALLBACK_I18N[state.lang] || FALLBACK_I18N.en;
        let value = getValue(table, path) || getValue(fallback, path) || getValue(FALLBACK_I18N.en, path) || path;
        Object.keys(params).forEach((key) => {
          value = value.replaceAll(`{${key}}`, params[key]);
        });
        return value;
      }

      function localized(value) {
        if (!value || typeof value !== 'object') return value || '';
        return value[state.lang] || value.en || Object.values(value)[0] || '';
      }

      function cellHref(cell) {
        return `/cells/${encodeURIComponent(cell.category)}/${encodeURIComponent(cell.slug)}/`;
      }

      function setStatus(message, isError = false) {
        status.textContent = message;
        status.classList.toggle('error', isError);
      }

      function applyLanguage() {
        document.documentElement.lang = state.lang;
        document.querySelectorAll('[data-i18n]').forEach((node) => {
          node.textContent = t(node.dataset.i18n);
        });
        document.querySelector('.lang-switcher').setAttribute('aria-label', t('ui.language'));
        langButtons.forEach((button) => {
          const active = button.dataset.lang === state.lang;
          button.classList.toggle('active', active);
          button.setAttribute('aria-pressed', String(active));
        });
      }

      function renderCatalog() {
        applyLanguage();

        if (!state.graph) {
          setStatus(t('ui.loading'));
          return;
        }

        const cells = Object.values(state.graph.cells || {});
        const byCategory = cells.reduce((groups, cell) => {
          const category = cell.category || 'knowledge';
          groups[category] = groups[category] || [];
          groups[category].push(cell);
          return groups;
        }, {});

        catalog.innerHTML = CATEGORY_ORDER.map((category) => {
          const items = (byCategory[category] || []).sort((a, b) => localized(a.title).localeCompare(localized(b.title), state.lang));
          const label = t(`categories.${category}`);
          const countKey = items.length === 1 ? 'ui.count_one' : 'ui.count_other';
          const cards = items.length
            ? `<div class="card-grid">${items.map((cell) => `
                <a class="cell-card" href="${cellHref(cell)}">
                  <span class="card-top">
                    <span class="cell-icon" aria-hidden="true">${cell.icon || '•'}</span>
                    <span class="cell-category">${label}</span>
                  </span>
                  <span class="cell-title">${localized(cell.title)}</span>
                  <span class="cell-desc">${localized(cell.description)}</span>
                </a>
              `).join('')}</div>`
            : `<div class="empty-category">${t('ui.empty')}</div>`;

          return `
            <section class="category-section" data-category="${category}" aria-labelledby="category-${category}">
              <div class="category-header">
                <h2 class="category-title" id="category-${category}">
                  <span class="category-dot" aria-hidden="true"></span>
                  <span>${label}</span>
                </h2>
                <span class="category-count">${t(countKey, { count: items.length })}</span>
              </div>
              ${cards}
            </section>
          `;
        }).join('');

        setStatus('');
      }

      async function loadJson(url) {
        const response = await fetch(url, { cache: 'no-store' });
        if (!response.ok) throw new Error(`${url} ${response.status}`);
        return response.json();
      }

      async function init() {
        setStatus(FALLBACK_I18N[state.lang].ui.loading);

        langButtons.forEach((button) => {
          button.addEventListener('click', () => {
            state.lang = button.dataset.lang;
            localStorage.setItem('micrfun.lang', state.lang);
            renderCatalog();
          });
        });

        try {
          const [en, ru, graph] = await Promise.all([
            loadJson('/data/i18n/en.json'),
            loadJson('/data/i18n/ru.json'),
            loadJson('/data/graph.json')
          ]);
          state.i18n = { en: { ...FALLBACK_I18N.en, ...en }, ru: { ...FALLBACK_I18N.ru, ...ru } };
          state.graph = graph;
          renderCatalog();
        } catch (error) {
          console.error(error);
          applyLanguage();
          catalog.innerHTML = `<div class="empty-state">${t('ui.error')}</div>`;
          setStatus(t('ui.error'), true);
        }
      }

      init();
    })();
  </script>
</body>
</html>
