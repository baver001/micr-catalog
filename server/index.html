<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>micr.fun</title>
    <style>
        :root {
            --canvas: #000000;
            --soft: #111111;
            --ink: #ffffff;
            --body: #a3a3a3;
            --hairline: #262626;
        }
        body { background: var(--canvas); color: var(--ink); font-family: system-ui, sans-serif; margin: 0; line-height: 1.5; }
        main { width: 90%; max-width: 720px; margin: 0 auto; padding: 48px 0; min-height: 80vh; }
        
        @media (max-width: 600px) {
            main { padding: 32px 0; }
            h1 { font-size: 28px !important; }
            .install-pill { font-size: 14px !important; padding: 10px 16px !important; }
            .card { padding: 20px !important; }
        }

        .hero { text-align: center; margin-bottom: 48px; }
        h1 { font-family: "SF Pro Rounded", system-ui, sans-serif; font-size: 36px; font-weight: 500; margin-bottom: 16px; }
        
        .install-pill { background: var(--soft); padding: 12px 20px; border-radius: 9999px; font-family: ui-monospace, monospace; font-size: 16px; margin-bottom: 32px; display: inline-block; border: 1px solid var(--hairline); word-break: break-all; }
        
        .btn-primary { background: var(--ink); color: #000; padding: 8px 20px; border-radius: 9999px; font-weight: 500; text-decoration: none; font-size: 14px; }
        .btn-primary:hover { background: var(--body); }
        
        .terminal-card { border: 1px solid var(--hairline); padding: 16px; border-radius: 12px; margin-bottom: 48px; background: var(--soft); }
        .terminal-header { display: flex; gap: 6px; margin-bottom: 12px; }
        .dot { width: 12px; height: 12px; border-radius: 9999px; }
        .code { font-family: ui-monospace, monospace; font-size: 14px; color: var(--ink); }
        .mute { color: var(--body); }

        .grid { display: grid; gap: 16px; grid-template-columns: 1fr; }
        .card { 
            border: 1px solid var(--hairline); padding: 0; border-radius: 12px; 
            text-decoration: none; color: inherit; display: block; overflow: hidden;
            transition: border-color 0.2s;
        }
        .card:hover { border-color: var(--body); }
        .card-img { width: 100%; height: 160px; object-fit: cover; background: var(--soft); }
        .card-content { padding: 24px; }
        h3 { font-size: 20px; font-weight: 500; margin: 0 0 8px 0; }
        p { color: var(--body); font-size: 16px; margin: 0; }

        .github-stars {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--soft); padding: 6px 16px; border-radius: 9999px;
            border: 1px solid var(--hairline); font-size: 14px; margin-bottom: 24px;
        }

        footer { border-top: 1px solid var(--hairline); padding: 32px 24px; color: var(--body); font-size: 12px; text-align: center; }
        .footer-links { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
        a { color: var(--ink); text-decoration: underline; }
    </style>
</head>
<body>
    <main>
        <div class="hero">
            <h1>micr.fun</h1>
            <div class="github-stars">★ 1,240 stars on GitHub</div>
            <div class="install-pill">curl micr.fun/install | sh</div>
            <div><a href="#" class="btn-primary">Get Started</a></div>
        </div>

        <div class="terminal-card">
            <div class="terminal-header">
                <div class="dot" style="background:#ff5f56"></div>
                <div class="dot" style="background:#ffbd2e"></div>
                <div class="dot" style="background:#27c93f"></div>
            </div>
            <div class="code">
                ollama launch micr-fun/example
            </div>
        </div>

        <div class="grid" id="catalog"></div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="#">Download</a> · <a href="#">Blog</a> · <a href="#">Docs</a> · 
            <a href="#">GitHub</a> · <a href="#">Discord</a> · <a href="#">X</a>
        </div>
        © 2026 micr.fun
    </footer>

    <script>
        const imgMap = {
            "Лень": "b2c95e2e1ae1f7b0f3830d4d595661381c69355491bdb76a112545e0b6c9da15.jpg"
        };
        fetch('/api/catalog')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('catalog');
                data.forEach(app => {
                    const img = imgMap[app.name] || '01d5efee194e6626ebad30abbf718ea036d563c48a4eace542eef7ba859fd76f.jpg';
                    container.innerHTML += `
                        <a href="${app.url}" class="card">
                            <img src="/.openclaw-cli-images/${img}" class="card-img" alt="${app.name}">
                            <div class="card-content">
                                <h3>${app.name}</h3>
                                <p>${app.description}</p>
                            </div>
                        </a>`;
                });
            });
    </script>
</body>
</html>
