<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breathing</title>
    <link rel="manifest" href="manifest.json">
    <script src="/apps-pwa-bridge.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #18181b;
            color: #fafafa;
            font-family: sans-serif;
            overflow: hidden;
        }

        .circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #8b5cf6, #d946ef, #8b5cf6);
            filter: blur(20px);
            opacity: 0.6;
            animation: breathe 8s infinite ease-in-out;
            position: absolute;
        }

        .circle-inner {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            position: absolute;
            animation: breathe-scale 8s infinite ease-in-out;
        }

        .text {
            font-size: 24px;
            font-weight: 500;
            z-index: 10;
            opacity: 0.8;
            animation: text-fade 8s infinite ease-in-out;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: scale(1);
                opacity: 0.4;
            }

            50% {
                transform: scale(2.5);
                opacity: 0.8;
            }
        }

        @keyframes breathe-scale {

            0%,
            100% {
                transform: scale(0.8);
            }

            50% {
                transform: scale(1.5);
            }
        }

        @keyframes text-fade {

            0%,
            100% {
                content: "Exhale";
                opacity: 0.5;
            }

            50% {
                content: "Inhale";
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="circle"></div>
    <div class="circle-inner"></div>
    <div class="text" id="label">Inhale</div>
    <script>
        const label = document.getElementById('label');
        let inhaling = true;
        setInterval(() => {
            inhaling = !inhaling;
            label.textContent = inhaling ? "Inhale" : "Exhale";
        }, 4000);
    </script>
</body>

</html>
