<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction</title>
    <link rel="manifest" href="manifest.json">
    <script src="/apps-pwa-bridge.js"></script>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #18181b;
            color: #fafafa;
            font-family: sans-serif;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }

        .state-waiting {
            background: #ef4444;
        }

        .state-ready {
            background: #22c55e;
        }

        .state-result {
            background: #3b82f6;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            text-align: center;
        }

        p {
            opacity: 0.8;
            font-size: 18px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div id="screen" style="text-align: center;">
        <h1 id="title">Click to Start</h1>
        <p id="subtitle">Wait for green...</p>
    </div>

    <script>
        const body = document.body;
        const title = document.getElementById('title');
        const subtitle = document.getElementById('subtitle');

        let state = 'start'; // start, waiting, ready, result
        let startTime = 0;
        let timeout = null;

        document.body.addEventListener('mousedown', handleClick);
        document.body.addEventListener('touchstart', (e) => { e.preventDefault(); handleClick(); });

        function handleClick() {
            if (state === 'start' || state === 'result') {
                reset();
            } else if (state === 'waiting') {
                tooEarly();
            } else if (state === 'ready') {
                finish();
            }
        }

        function reset() {
            state = 'waiting';
            body.className = 'state-waiting';
            title.textContent = "Wait for Green...";
            subtitle.textContent = "Click when screen turns green";

            const delay = 1000 + Math.random() * 3000;
            timeout = setTimeout(() => {
                state = 'ready';
                body.className = 'state-ready';
                title.textContent = "CLICK!";
                subtitle.textContent = "";
                startTime = Date.now();
            }, delay);
        }

        function tooEarly() {
            clearTimeout(timeout);
            state = 'result';
            body.className = 'state-waiting'; // Red again
            title.textContent = "Too Early!";
            subtitle.textContent = "Click to try again";
        }

        function finish() {
            const time = Date.now() - startTime;
            state = 'result';
            body.className = 'state-result';
            title.textContent = `${time} ms`;
            subtitle.textContent = "Click to try again";
        }
    </script>
</body>

</html>
