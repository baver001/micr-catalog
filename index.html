<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>micr.fun — Микроприложения</title>
    <meta name="description" content="Коллекция интерактивных микроприложений. Простые, быстрые, бесплатные.">
    <meta name="theme-color" content="#0a0e27">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="theme-dark">
    <!-- Background Particles -->
    <canvas id="particleCanvas" class="particles-bg"></canvas>

    <!-- Build Timestamp -->
    <div style="position: absolute; top: 2px; left: 0; right: 0; text-align: center; font-size: 10px; color: hsl(var(--muted-foreground)); z-index: 1000; pointer-events: none;">
        Обновлено: 21.04.2026 11:47
    </div>

    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <!-- Logo area -->
            <div class="header-left">
                <div style="width: 44px; height: 44px;"></div>
                <a href="/" class="logo-container" id="logoLink">
                    <svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg" id="logoSvg">
                        <rect width="44" height="44" rx="14" fill="#1a1a1a" />
                        <rect x="11" y="12" width="9" height="20" rx="4" fill="#60a5fa" id="leftEye" />
                        <rect x="24" y="12" width="9" height="20" rx="4" fill="#a855f7" id="rightEye" />
                    </svg>
                </a>
            </div>

            <!-- Central Title -->
            <div class="header-center">
                <p class="header-subtitle" data-i18n="heroSubtitle">Коллекция микро игр и приложений</p>
            </div>

            <!-- Actions Area -->
            <div class="header-right">
                <button id="searchTrigger" class="btn-icon touch-target" title="Поиск (Ctrl+K)">
                    <i data-lucide="search"></i>
                </button>

                <button id="settingsBtn" class="btn-icon touch-target" title="Настройки">
                    <i data-lucide="sliders-horizontal"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container main-content">
        <!-- Hero Section -->
        <section class="hero-section">
            <h1 class="hero-title" data-i18n="heroTitle">Всё самое лучшее в одном месте</h1>
            <div class="filters-bar">
                <!-- Mobile-only Filter Trigger -->
                <button id="mobileFilterTrigger" class="mobile-filter-trigger hidden-desktop">
                    <span class="trigger-label">
                        <i data-lucide="filter"></i>
                        <span id="mobileFilterLabel">Фильтры и сортировка</span>
                    </span>
                    <i data-lucide="chevron-down" class="chevron-icon"></i>
                </button>

                <!-- Desktop/Mobile Filters -->
                <div id="filtersContainer" class="filters-wrapper">
                    <!-- Loaded via JS -->
                </div>
            </div>
        </section>

        <!-- Apps Grid -->
        <section id="appsGrid" class="apps-grid">
            <!-- Loaded via JS -->
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer-container">
        <div class="container glass">
            <p data-i18n="footerText">micr.fun &copy; 2026. Все права защищены.</p>
        </div>
    </footer>

    <!-- Modals -->
    <div id="filtersModal" class="modal-overlay hidden">
        <div class="modal-content bottom-sheet">
            <div class="modal-header">
                <h3 data-i18n="filtersTitle">Фильтры</h3>
                <button class="close-modal"><i data-lucide="x"></i></button>
            </div>
            <div id="mobileFiltersContent" class="modal-body">
                <!-- Loaded via JS -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="/js/app-main.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</body>

</html>
