<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>micr.fun — Каталог микроприложений</title>
<meta name="theme-color" content="#0d0c0a">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #121212;
  --bg-elevated: rgba(255,255,255,0.03);
  --bg-hover: rgba(255,255,255,0.06);
  --text-primary: #ffffff;
  --text-secondary: #9ca3af;
  --text-muted: #6b7280;
  --border: rgba(255,255,255,0.06);
  --border-hover: rgba(255,255,255,0.12);
  --accent: #3b82f6;
  --accent-teal: #2dd4bf;
  --radius: 14px;
  --transition: all 0.2s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  background: var(--bg);
  color: var(--text-primary);
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-weight: 400;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

body {
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(59,130,246,0.08) 0%, transparent 50%),
              radial-gradient(ellipse 60% 40% at 80% 100%, rgba(45,212,191,0.05) 0%, transparent 50%),
              var(--bg);
  min-height: 100vh;
}

::selection { background: var(--accent); color: #fff; }

/* Header */
.header {
  padding: 24px clamp(16px, 5vw, 48px);
  max-width: 1200px;
  margin: 0 auto;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 24px;
}

.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-link { display: flex; align-items: center; text-decoration: none; }
.logo-link:hover { opacity: 0.85; }

/* Controls */
.controls {
  display: flex;
  align-items: center;
  gap: 12px;
}

.search-wrap {
  position: relative;
}

.search-wrap input {
  width: 220px;
  padding: 10px 14px 10px 38px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: inherit;
  font-size: 14px;
  transition: var(--transition);
  outline: none;
}

.search-wrap input::placeholder { color: var(--text-muted); }
.search-wrap input:focus { border-color: var(--accent); background: var(--bg-hover); }

.search-wrap svg {
  position: absolute;
  left: 14px; top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 18px;
  color: var(--text-muted);
  pointer-events: none;
}

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.filter-btn {
  padding: 8px 16px;
  background: transparent;
  border: 1px solid var(--btn-color, var(--border));
  border-radius: 999px;
  color: var(--btn-color, var(--text-secondary));
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.filter-btn:hover {
  background: var(--btn-color, var(--accent));
  border-color: var(--btn-color, var(--accent));
  color: #fff;
}

.filter-btn.active {
  background: var(--btn-color, var(--accent));
  border-color: var(--btn-color, var(--accent));
  color: #fff;
  box-shadow: 0 0 12px color-mix(in srgb, var(--btn-color, var(--accent)) 40%, transparent);
}

/* Grid */
.main {
  padding: 32px clamp(16px, 5vw, 48px) 64px;
  max-width: 1200px;
  margin: 0 auto;
}

.app-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 20px;
}

/* Card */
.app-card {
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.app-card:hover {
  border-color: var(--border-hover);
  background: var(--bg-hover);
}

.card-preview {
  height: 120px;
  overflow: hidden;
  background: var(--bg-elevated);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.card-preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.card-badge-overlay {
  position: absolute;
  top: 8px; right: 8px;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  backdrop-filter: blur(4px);
}

.card-title-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 10px 12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
  font-size: 15px;
  font-weight: 600;
  color: #fff;
}

.card-desc {
  padding: 8px 12px 0;
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-action {
  display: block;
  width: 100%;
  padding: 10px;
  background: transparent;
  border: none;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  text-align: center;
  margin-top: 8px;
}

.card-action:hover {
  color: var(--accent);
  background: var(--bg-hover);
}

/* Hidden card (filtered out) */
.app-card.hidden { display: none; }

/* Empty state */
.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
  font-size: 15px;
}

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.active { display: flex; }

.modal {
  width: 100%;
  max-width: 1100px;
  height: 90vh;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  animation: modalIn 0.2s ease;
}

@keyframes modalIn {
  from { opacity: 0; transform: scale(0.96) translateY(10px); }
  to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 52px;
  gap: 12px;
}

.modal-info { display: flex; align-items: center; gap: 10px; min-width: 0; }

.modal-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.modal-badge {
  padding: 2px 8px;
  border-radius: 999px;
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  flex-shrink: 0;
}

.modal-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.modal-btn {
  padding: 6px 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  display: flex; align-items: center; gap: 4px;
  white-space: nowrap;
}

.modal-btn:hover { border-color: var(--border-hover); color: var(--text-primary); }

.modal-btn svg, .modal-btn .icon { width: 14px; height: 14px; }

.modal-iframe-wrap { flex: 1; position: relative; background: var(--bg); }
.modal-iframe-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

.modal-loading {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  gap: 10px;
  color: var(--text-muted);
  font-size: 13px;
}

.modal-loading .spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Footer */
.footer {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 12px;
  border-top: 1px solid var(--border);
  max-width: 1200px;
  margin: 0 auto;
}

/* Mobile */
@media (max-width: 640px) {
  .app-grid { grid-template-columns: 1fr; gap: 12px; }
  .modal { height: 100vh; border-radius: 0; }
  .modal-overlay { padding: 0; }
  .modal-title { font-size: 13px; }
  .modal-btn span { display: none; }
  .modal-btn { padding: 6px; }
}

@media (max-width: 480px) {
  .header { padding: 16px; }
  .main { padding: 0 16px 40px; }
  .app-card { padding: 18px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="header-left">
      <a href="/" class="logo-link">
        <img src="/logo-sm.png" alt="micr.fun" height="16" style="display:block">
      </a>
    </div>
    <div class="controls">
      <div class="filters" id="filters">
        <button class="filter-btn active" data-filter="all">Все</button>
        <button class="filter-btn" data-filter="games">Игры</button>
        <button class="filter-btn" data-filter="tools">Инструменты</button>
        <button class="filter-btn" data-filter="creative">Креатив</button>
        <button class="filter-btn" data-filter="fun">Развлечения</button>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search" placeholder="Найти приложение..." autocomplete="off">
      </div>
    </div>
  </div>
</header>

<main class="main">
  <div class="app-grid" id="appGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none">Ничего не найдено</div>
</main>

<footer class="footer">
  micr.fun · 2026
</footer>

<script>
const APPS = [
  { id: 'laziness', name: 'Лень', description: 'Фундаментальная модель блокировки действия и внутреннего конфликта', category: 'creative', color: '#8b5cf6', views: 9200, url: '/laziness/', icon: 'coffee' },
  { id: 'breathing', name: 'Дыхание', description: 'Упражнения на дыхание для расслабления и концентрации', category: 'tools', color: '#3b82f6', views: 3200, url: '/apps/breathing/index.html', icon: 'wind' },
  { id: 'color-palette', name: 'Палитра', description: 'Генератор и подбор красивых цветовых сочетаний', category: 'creative', color: '#a855f7', views: 2800, url: '/apps/color-palette/index.html', icon: 'palette' },
  { id: 'dice', name: 'Кости', description: 'Бросай виртуальные игральные кости', category: 'fun', color: '#f43f5e', views: 5400, url: '/apps/dice/index.html', icon: 'dices' },
  { id: 'reaction', name: 'Реакция', description: 'Проверь свою скорость реакции', category: 'games', color: '#f59e0b', views: 4100, url: '/apps/reaction/index.html', icon: 'zap' },
  { id: 'reaction-test', name: 'Реакция Тест', description: 'Расширенный тест скорости реакции с разными режимами', category: 'games', color: '#ef4444', views: 3600, url: '/apps/reaction-test/index.html', icon: 'timer' }
];

const CATEGORY_LABELS = {
  all: 'Все',
  games: 'Игры',
  tools: 'Инструменты',
  creative: 'Креатив',
  fun: 'Развлечения'
};

const FILTER_COLORS = {
  all: '#3b82f6',
  games: '#f59e0b',
  tools: '#3b82f6',
  creative: '#8b5cf6',
  fun: '#f43f5e'
};
const grid = document.getElementById('appGrid');
const empty = document.getElementById('emptyState');
const search = document.getElementById('search');
const filterBtns = document.querySelectorAll('.filter-btn');

let activeFilter = 'all';
let activeQuery = '';

function createCard(app) {
  const card = document.createElement('div');
  card.className = 'app-card';
  card.dataset.id = app.id;
  card.dataset.category = app.category;

  card.innerHTML = `
    <div class="card-preview">
      <img src="/data/previews/${app.category}.svg" alt="" loading="lazy">
      <span class="card-badge-overlay" style="background:${app.color}20;color:${app.color};border:1px solid ${app.color}40">${CATEGORY_LABELS[app.category] || app.category}</span>
      <div class="card-title-overlay">${app.name}</div>
    </div>
    <div class="card-desc">${app.description}</div>
    <button class="card-action">Открыть</button>
  `;

  card.addEventListener('click', (e) => {
    if (e.target.closest('.card-action')) {
      e.stopPropagation();
      window.location.href = app.url;
    } else {
      window.location.href = app.url;
    }
  });

  return card;
}

function render() {
  // Set filter button colors
  filterBtns.forEach(btn => {
    const cat = btn.dataset.filter;
    btn.style.setProperty('--btn-color', FILTER_COLORS[cat] || '#3b82f6');
  });

  grid.innerHTML = '';
  let count = 0;

  for (const app of APPS) {
    const matchesFilter = activeFilter === 'all' || app.category === activeFilter;
    const q = activeQuery.toLowerCase();
    const matchesSearch = !q || app.name.toLowerCase().includes(q) || app.description.toLowerCase().includes(q);

    if (matchesFilter && matchesSearch) {
      grid.appendChild(createCard(app));
      count++;
    }
  }

  empty.style.display = count === 0 ? 'block' : 'none';
}

// Events
search.addEventListener('input', (e) => {
  activeQuery = e.target.value;
  render();
});

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

render();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

</body>
</html>
