<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Модерация — micr.fun</title>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 260px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 20px;
            flex-shrink: 0;
        }

        .admin-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding: 0 12px;
        }

        .admin-logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, #8b5cf6, #d946ef);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 14px;
        }

        .admin-logo-text {
            font-size: 18px;
            font-weight: 600;
        }

        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .admin-main {
            flex: 1;
            padding: 24px 32px;
            overflow-y: auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .admin-header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 24px;
        }

        .tab {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.15s;
        }

        .tab:hover {
            color: var(--text-secondary);
        }

        .tab.active {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .submission-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .submission-header {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 16px;
        }

        .submission-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            flex-shrink: 0;
        }

        .submission-info {
            flex: 1;
        }

        .submission-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .submission-desc {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 8px;
        }

        .submission-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .submission-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .submission-preview {
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            height: 300px;
            margin-bottom: 16px;
            overflow: hidden;
        }

        .submission-preview iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .preview-placeholder {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .preview-placeholder svg {
            margin-bottom: 8px;
            opacity: 0.5;
        }

        .submission-actions {
            display: flex;
            gap: 12px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .approve-btn {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
        }

        .approve-btn:hover {
            background: rgba(34, 197, 94, 0.2);
        }

        .reject-btn {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }

        .reject-btn:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .preview-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .preview-btn:hover {
            border-color: var(--border-hover);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .logout-btn {
            color: var(--text-muted);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: auto;
            padding: 12px 16px;
            border-radius: 12px;
            transition: all 0.15s;
            border: none;
            background: none;
            cursor: pointer;
            width: 100%;
        }

        .logout-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <div class="admin-logo">
                <div class="admin-logo-icon">m</div>
                <span class="admin-logo-text">Admin</span>
            </div>

            <nav class="admin-nav">
                <a href="/admin/" class="admin-nav-item">
                    <i data-lucide="layout-grid" style="width: 20px; height: 20px;"></i>
                    Дашборд
                </a>
                <a href="/admin/review.html" class="admin-nav-item active">
                    <i data-lucide="file-check" style="width: 20px; height: 20px;"></i>
                    Модерация
                    <span class="pending-badge"
                        style="margin-left: auto; padding: 2px 8px; border-radius: 10px; font-size: 11px; color: white;"
                        id="pendingCount">0</span>
                </a>
                <a href="/" class="admin-nav-item">
                    <i data-lucide="external-link" style="width: 20px; height: 20px;"></i>
                    На сайт
                </a>
            </nav>

            <button class="logout-btn" id="logoutBtn">
                <i data-lucide="log-out" style="width: 18px; height: 18px;"></i>
                Выйти
            </button>
        </aside>

        <main class="admin-main">
            <div class="admin-header">
                <h1>Модерация заявок</h1>
            </div>

            <div class="tabs">
                <button class="tab active" data-tab="pending">Ожидают</button>
                <button class="tab" data-tab="approved">Одобрено</button>
                <button class="tab" data-tab="rejected">Отклонено</button>
            </div>

            <div id="submissionsList">
                <!-- Populated by JS -->
            </div>
        </main>
    </div>

    <script type="module">
        import { isAdminAuthenticated, adminLogout, getSubmissions, updateSubmissionStatus, deleteSubmission, initTheme } from '/js/store.js';
        import { createIcons, icons } from 'lucide';

        const refreshIcons = () => createIcons({ icons });
        requestAnimationFrame(() => refreshIcons());

        initTheme();

        if (!isAdminAuthenticated()) {
            window.location.href = '/admin/';
        }

        let currentTab = 'pending';

        const tabs = document.querySelectorAll('.tab');
        const submissionsList = document.getElementById('submissionsList');
        const logoutBtn = document.getElementById('logoutBtn');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                renderSubmissions();
            });
        });

        logoutBtn.addEventListener('click', () => {
            adminLogout();
            window.location.href = '/admin/';
        });

        async function renderSubmissions() {
            const submissions = await getSubmissions();
            const filtered = submissions.filter(s => s.status === currentTab);
            const pendingCount = submissions.filter(s => s.status === 'pending').length;

            document.getElementById('pendingCount').textContent = pendingCount;

            if (filtered.length === 0) {
                submissionsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon" style="display: flex; justify-content: center; margin-bottom: 16px;">
                            ${currentTab === 'pending' ? '<i data-lucide="inbox" style="width: 48px; height: 48px;"></i>' : currentTab === 'approved' ? '<i data-lucide="check-circle" style="width: 48px; height: 48px;"></i>' : '<i data-lucide="x-circle" style="width: 48px; height: 48px;"></i>'}
                        </div>
                        <p>${currentTab === 'pending' ? 'Нет заявок на модерации' : currentTab === 'approved' ? 'Нет одобренных заявок' : 'Нет отклонённых заявок'}</p>
                    </div>
                `;
                refreshIcons();
                return;
            }

            submissionsList.innerHTML = filtered.map(submission => `
            <div class="submission-card" data-id="${submission.id}">
                <div class="submission-header">
                    <div class="submission-icon bg-gradient-to-br ${submission.color}" style="display: flex; align-items: center; justify-content: center; color: white;">
                        <i data-lucide="${submission.icon}" style="width: 28px; height: 28px;"></i>
                    </div>
                    <div class="submission-info">
                        <div class="submission-name">${escapeHtml(submission.name)}</div>
                        <div class="submission-desc">${escapeHtml(submission.description)}</div>
                        <div class="submission-meta">
                            <span>📁 ${getCategoryName(submission.category)}</span>
                            <span>📧 ${escapeHtml(submission.email)}</span>
                            <span>📅 ${formatDate(submission.submitted_at)}</span>
                        </div>
                    </div>
                </div>

                ${submission.url ? `
                        <div class="submission-preview">
                            <iframe src="${escapeHtml(submission.url)}" sandbox="allow-scripts allow-same-origin"></iframe>
                        </div>
                    ` : `
                        <div class="submission-preview">
                            <div class="preview-placeholder">
                                <i data-lucide="image-off" style="width: 32px; height: 32px; opacity: 0.5;"></i>
                                <span>Нет превью</span>
                            </div>
                        </div>
                    `}

                ${currentTab === 'pending' ? `
                        <div class="submission-actions">
                            <button class="action-btn approve-btn" onclick="approveSubmission('${submission.id}')">
                                <i data-lucide="check" style="width: 18px; height: 18px;"></i>
                                Одобрить
                            </button>
                            <button class="action-btn reject-btn" onclick="rejectSubmission('${submission.id}')">
                                <i data-lucide="x" style="width: 18px; height: 18px;"></i>
                                Отклонить
                            </button>
                        </div>
                    ` : `
                        <div class="submission-actions">
                            <button class="action-btn preview-btn" onclick="deleteSubmissionById('${submission.id}')">
                                <i data-lucide="trash-2" style="width: 18px; height: 18px;"></i>
                                Удалить
                            </button>
                        </div>
                    `}
            </div>
            `).join('');
            refreshIcons();
        }

        window.approveSubmission = async function (id) {
            await updateSubmissionStatus(id, 'approved');
            renderSubmissions();
        };

        window.rejectSubmission = async function (id) {
            await updateSubmissionStatus(id, 'rejected');
            renderSubmissions();
        };

        window.deleteSubmissionById = async function (id) {
            if (confirm('Удалить эту заявку?')) {
                await deleteSubmission(id);
                renderSubmissions();
            }
        };

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        }

        function getCategoryName(category) {
            const names = { games: 'Игры', tools: 'Инструменты', creative: 'Креатив', learning: 'Обучение', fun: 'Развлечения', social: 'Социальные' };
            return names[category] || category;
        }

        renderSubmissions();
    </script>
</body>

</html>
