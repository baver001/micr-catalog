<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Инбокс · micr.fun</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,700;1,9..144,400&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0c0a;--bg-2:#15130f;--bg-3:#1d1a14;--ink:#e8e3d6;--ink-dim:#9a9485;--ink-faint:#5a564b;--line:#2a261f;--accent:#d4541c;--accent-2:#e8a838;--signal:#7fa886;--warn:#b85540;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--bg);color:var(--ink);font-family:'Fraunces',serif;font-weight:300;line-height:1.55;-webkit-font-smoothing:antialiased;}
  body{padding:clamp(20px,4vw,40px);max-width:800px;margin:0 auto;}
  h1{font-size:clamp(28px,5vw,48px);font-weight:300;letter-spacing:-.02em;margin-bottom:6px;}
  .sub{color:var(--ink-dim);font-style:italic;margin-bottom:32px;font-size:15px;}
  .login-wrap{text-align:center;padding:80px 0;}
  .login-wrap input{background:var(--bg-2);border:1px solid var(--line);color:var(--ink);padding:12px 16px;font-family:'JetBrains Mono',monospace;font-size:14px;width:200px;outline:none;}
  .login-wrap input:focus{border-color:var(--accent);}
  .login-wrap button{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--bg);background:var(--accent);border:none;padding:12px 24px;cursor:pointer;letter-spacing:.15em;text-transform:uppercase;margin-left:8px;}
  .login-wrap .error{color:var(--warn);margin-top:12px;font-size:13px;display:none;}
  .item{border-top:1px solid var(--line);padding:clamp(16px,2.5vw,24px) 0;}
  .item:last-child{border-bottom:1px solid var(--line);}
  .item .meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-faint);letter-spacing:.05em;margin-bottom:6px;}
  .item .meta .page{color:var(--accent-2);}
  .item .text{font-size:clamp(15px,2vw,18px);line-height:1.5;color:var(--ink);}
  .item .contact{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-dim);margin-top:8px;}
  .empty{text-align:center;padding:80px 0;color:var(--ink-faint);font-style:italic;}
  #logout{position:fixed;top:16px;right:16px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-faint);background:var(--bg-2);border:1px solid var(--line);padding:8px 16px;cursor:pointer;letter-spacing:.1em;text-transform:uppercase;z-index:10;}
  #logout:hover{color:var(--warn);border-color:var(--warn);}
</style>
</head>
<body>
<h1>Инбокс</h1>
<p class="sub">Обратная связь с пользователей</p>

<div id="login" class="login-wrap">
  <input type="password" id="keyInput" placeholder="Ключ доступа">
  <button id="loginBtn">Войти</button>
  <p class="error" id="loginError">Неверный ключ</p>
</div>

<div id="inbox" style="display:none">
  <button id="logout">Выйти</button>
  <div id="list"></div>
</div>

<script>
const KEY = 'smysl2026';
const login = document.getElementById('login');
const inbox = document.getElementById('inbox');
const list = document.getElementById('list');
const keyInput = document.getElementById('keyInput');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const logoutBtn = document.getElementById('logout');

if (sessionStorage.getItem('inbox_auth') === KEY) showInbox();

loginBtn.addEventListener('click', () => {
  if (keyInput.value === KEY) {
    sessionStorage.setItem('inbox_auth', KEY);
    showInbox();
  } else {
    loginError.style.display = 'block';
  }
});

keyInput.addEventListener('keydown', e => { if (e.key === 'Enter') loginBtn.click(); });

logoutBtn.addEventListener('click', () => {
  sessionStorage.removeItem('inbox_auth');
  login.style.display = 'block';
  inbox.style.display = 'none';
});

function showInbox() {
  login.style.display = 'none';
  inbox.style.display = 'block';
  loadFeedback();
}

async function loadFeedback() {
  list.innerHTML = '<p class="empty">Загрузка…</p>';
  try {
    const r = await fetch('/api/feedback?key=' + encodeURIComponent(KEY));
    if (!r.ok) throw new Error();
    const data = await r.json();
    if (!data.length) {
      list.innerHTML = '<p class="empty">Пока нет сообщений</p>';
      return;
    }
    list.innerHTML = data.sort((a,b) => b.id - a.id).map(item => {
      const d = new Date(item.created);
      const dateStr = d.toLocaleDateString('ru-RU') + ' ' + d.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
      return `<div class="item">
        <div class="meta">${dateStr}${item.page ? ' · <span class="page">' + item.page + '</span>' : ''}</div>
        <div class="text">${escapeHtml(item.text)}</div>
        ${item.contact ? '<div class="contact">✉ ' + escapeHtml(item.contact) + '</div>' : ''}
      </div>`;
    }).join('');
  } catch {
    list.innerHTML = '<p class="empty" style="color:var(--warn)">Ошибка загрузки</p>';
  }
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
