<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spend Elon's Money — micr.fun</title>
    <link rel="manifest" href="manifest.json">
    <script src="/apps-pwa-bridge.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .balance {
            font-size: 42px;
            font-weight: 700;
            color: #22c55e;
            margin: 20px 0;
        }

        .balance-label {
            color: #94a3b8;
            font-size: 14px;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }

        .item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            transition: all 0.2s;
        }

        .item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
        }

        .item-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .item-name {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .item-price {
            color: #fbbf24;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .item-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .item-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            border: none;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.15s;
        }

        .item-btn.buy {
            background: #22c55e;
            color: white;
        }

        .item-btn.sell {
            background: #ef4444;
            color: white;
        }

        .item-btn:hover {
            transform: scale(1.1);
        }

        .item-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .item-count {
            min-width: 40px;
            font-weight: 600;
        }

        .reset-btn {
            display: block;
            margin: 30px auto 0;
            padding: 12px 30px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>💰 Spend Elon's Money</h1>
            <p class="balance-label">У вас осталось:</p>
            <div class="balance" id="balance">$241,000,000,000</div>
        </header>

        <div class="items-grid" id="items"></div>

        <button class="reset-btn" onclick="resetGame()">🔄 Начать заново</button>
    </div>

    <script>
        const INITIAL_MONEY = 241_000_000_000;
        let money = INITIAL_MONEY;
        let purchases = {};

        const items = [
            { id: 'bigmac', name: 'Биг Мак', price: 5, icon: '🍔' },
            { id: 'book', name: 'Книга', price: 15, icon: '📚' },
            { id: 'sneakers', name: 'Кроссовки Nike', price: 150, icon: '👟' },
            { id: 'iphone', name: 'iPhone 15 Pro', price: 1200, icon: '📱' },
            { id: 'macbook', name: 'MacBook Pro', price: 2500, icon: '💻' },
            { id: 'rolex', name: 'Rolex', price: 15000, icon: '⌚' },
            { id: 'tesla', name: 'Tesla Model S', price: 80000, icon: '🚗' },
            { id: 'house', name: 'Дом', price: 500000, icon: '🏠' },
            { id: 'yacht', name: 'Яхта', price: 5000000, icon: '🛥️' },
            { id: 'jet', name: 'Частный самолёт', price: 50000000, icon: '✈️' },
            { id: 'island', name: 'Остров', price: 100000000, icon: '🏝️' },
            { id: 'nba', name: 'Команда NBA', price: 2000000000, icon: '🏀' }
        ];

        function formatMoney(amount) {
            return '$' + amount.toLocaleString('en-US');
        }

        function updateBalance() {
            document.getElementById('balance').textContent = formatMoney(money);
        }

        function buy(id) {
            const item = items.find(i => i.id === id);
            if (money >= item.price) {
                money -= item.price;
                purchases[id] = (purchases[id] || 0) + 1;
                updateBalance();
                renderItems();
            }
        }

        function sell(id) {
            const item = items.find(i => i.id === id);
            if (purchases[id] > 0) {
                money += item.price;
                purchases[id]--;
                updateBalance();
                renderItems();
            }
        }

        function renderItems() {
            const container = document.getElementById('items');
            container.innerHTML = items.map(item => `
                <div class="item">
                    <div class="item-icon">${item.icon}</div>
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">${formatMoney(item.price)}</div>
                    <div class="item-controls">
                        <button class="item-btn sell" onclick="sell('${item.id}')" ${!purchases[item.id] ? 'disabled' : ''}>−</button>
                        <span class="item-count">${purchases[item.id] || 0}</span>
                        <button class="item-btn buy" onclick="buy('${item.id}')" ${money < item.price ? 'disabled' : ''}>+</button>
                    </div>
                </div>
            `).join('');
        }

        function resetGame() {
            money = INITIAL_MONEY;
            purchases = {};
            updateBalance();
            renderItems();
        }

        renderItems();
    </script>
</body>

</html>
